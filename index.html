<!DOCTYPE html>
<html>
<head>
<title>Zomato Clone</title>
<style>
body{font-family:Arial;margin:0;background:#fafafa}
.header{background:#e23744;color:white;padding:30px;text-align:center}
.search{text-align:center;margin:40px}
input{padding:14px;width:60%;font-size:16px;border-radius:6px;border:1px solid #ddd}
.cards{display:flex;justify-content:center;gap:20px;flex-wrap:wrap;margin:30px}
.card{background:white;border-radius:10px;box-shadow:0 4px 12px rgba(0,0,0,.1);padding:20px;width:220px;text-align:center}
</style>
</head>
<body>

<div class="header">
<h1>Zomato</h1>
<p>Discover the best food & drinks in your city</p>
</div>

<div class="search">
<input placeholder="Search for restaurant or dish">
</div>

<div class="cards">
<div class="card">🍕 Pizza Hub ⭐ 4.3</div>
<div class="card">🍛 Biryani House ⭐ 4.5</div>
<div class="card">🍔 Burger Town ⭐ 4.1</div>
<div class="card">🥗 Healthy Bowl ⭐ 4.6</div>
</div>

</body>
</html>
